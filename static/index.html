      { id: 5, name: 'Vinland Saga', synopsis: 'Un jeune viking cherche à venger la mort de son père.', status: 'terminé', genres: ['Seinen'] },
      { id: 6, name: 'Frieren', synopsis: 'Une elfe magicienne part en voyage après la mort de ses compagnons.', status: 'à venir', genres: ['Slice of Life', 'Seinen'] },
    ];
    var _mockUsers = [
      { id: 1, pseudo: 'otaku42' },
      { id: 2, pseudo: 'sakura_fan' },
      { id: 3, pseudo: 'nekosan' },
    ];
    var _mockGenres = [
      { name: 'Shōnen' }, { name: 'Seinen' }, { name: 'Isekai' },
      { name: 'Action' }, { name: 'Romance' }, { name: 'Slice of Life' },
    ];
    var _mockUserAnimes = [
      { user_id: 1, anime_id: 1, statut: 'Vu', note: 10 },
      { user_id: 1, anime_id: 3, statut: 'En cours de visionnage', note: 8 },
      { user_id: 2, anime_id: 2, statut: 'Vu', note: 9 },
      { user_id: 2, anime_id: 5, statut: 'À voir', note: null },
      { user_id: 3, anime_id: 6, statut: 'À voir', note: null },
    ];
    var _mockId = 100;

    function mockDelay(data) { return new Promise(function(r){ setTimeout(function(){ r(JSON.parse(JSON.stringify(data))); }, 250); }); }
    function mockGetAnimes() { return mockDelay(_mockAnimes); }
    function mockGetAnime(id) { var a = _mockAnimes.find(function(x){ return x.id === id; }); return a ? mockDelay(a) : Promise.reject(new Error('Anime non trouvé')); }
    function mockAddAnime(data) { var a = Object.assign({ id: ++_mockId, genres: [] }, data); _mockAnimes.push(a); return mockDelay(a); }
    function mockUpdateAnime(id, data) { var i = _mockAnimes.findIndex(function(x){ return x.id === id; }); if (i < 0) return Promise.reject(new Error('Non trouvé')); _mockAnimes[i] = Object.assign({}, _mockAnimes[i], data); return mockDelay(_mockAnimes[i]); }
    function mockDeleteAnime(id) { _mockAnimes = _mockAnimes.filter(function(x){ return x.id !== id; }); return mockDelay({ message: 'ok' }); }
    function mockGetUsers() { return mockDelay(_mockUsers); }
    function mockAddUser(data) { _mockUsers.push({ id: ++_mockId, pseudo: data.pseudo }); return mockDelay({ message: 'ok' }); }
    function mockDeleteUser(id) { _mockUsers = _mockUsers.filter(function(x){ return x.id !== id; }); return mockDelay({ message: 'ok' }); }
    function mockGetGenres() { return mockDelay(_mockGenres); }
    function mockAddGenre(data) { _mockGenres.push({ name: data.name }); return mockDelay({ message: 'ok' }); }
    function mockGetUserAnimes(userId) {
      var list = _mockUserAnimes.filter(function(ua){ return ua.user_id === userId; });
      var result = list.map(function(ua) {
        var anime = _mockAnimes.find(function(a){ return a.id === ua.anime_id; }) || {};
        return Object.assign({}, ua, { anime_name: anime.name || '?', anime_status: anime.status || '', anime_genres: anime.genres || [] });
      });
      return mockDelay(result);
    }
    function mockAddUserAnime(userId, data) {
      var exists = _mockUserAnimes.find(function(ua){ return ua.user_id === userId && ua.anime_id === data.anime_id; });
      if (exists) return Promise.reject(new Error('Cet anime est déjà dans la liste'));
      var entry = { user_id: userId, anime_id: data.anime_id, statut: data.statut || 'À voir', note: data.note || null };
      _mockUserAnimes.push(entry);
      var anime = _mockAnimes.find(function(a){ return a.id === data.anime_id; }) || {};
      return mockDelay(Object.assign({}, entry, { anime_name: anime.name || '?', anime_genres: anime.genres || [] }));
    }
    function mockUpdateUserAnime(userId, animeId, data) {
      var i = _mockUserAnimes.findIndex(function(ua){ return ua.user_id === userId && ua.anime_id === animeId; });
      if (i < 0) return Promise.reject(new Error('Non trouvé'));
      _mockUserAnimes[i] = Object.assign({}, _mockUserAnimes[i], data);
      return mockDelay(_mockUserAnimes[i]);
    }
    function mockDeleteUserAnime(userId, animeId) {
      _mockUserAnimes = _mockUserAnimes.filter(function(ua){ return !(ua.user_id === userId && ua.anime_id === animeId); });
      return mockDelay({ message: 'ok' });
    }

    var API_BASE = '';
    async function apiFetch(path, options) {
      options = options || {};
      try {
        var res = await fetch(API_BASE + path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, options));
        if (!res.ok) { var err = await res.json().catch(function(){ return {}; }); throw new Error(err.error || err.erreur || 'Erreur ' + res.status); }
        return res.json();
      } catch(e) {
        if (e instanceof TypeError) throw new Error('Impossible de contacter le serveur');
        throw e;
      }
    }

    function apiGetAnimes()       { return MOCK_MODE ? mockGetAnimes()       : apiFetch('/animes'); }

    function apiGetGenres()       { return MOCK_MODE ? mockGetGenres()       : apiFetch('/genres'); }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

}

// AnimeList — catalogue avec recherche, filtres et grille

function AnimeList({ onSelect, onAdd, refreshKey }) {
  const [animes, setAnimes]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [search, setSearch]     = useState('');
  const [filter, setFilter]     = useState('tous');
  const [deleting, setDeleting] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const data = await apiGetAnimes();
      setAnimes(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { load(); }, [load, refreshKey]);

  const handleDelete = async (id) => {
    if (!window.confirm('Supprimer cet anime ?')) return;
    setDeleting(id);
    try {
      await apiDeleteAnime(id);
      setAnimes(prev => prev.filter(a => a.id !== id));
    } catch (e) {
      alert('Erreur : ' + e.message);
    } finally {
      setDeleting(null);
    }
  };

  const filtered = animes.filter(a => {
    const matchSearch = a.name.toLowerCase().includes(search.toLowerCase());
    const matchFilter = filter === 'tous' || a.status === filter;
    return matchSearch && matchFilter;
  });

  const STATUS_FILTERS = ['tous', 'en cours', 'terminé', 'à venir'];

  return (
    <div style={alStyles.container}>
      {/* Header */}
      <div style={alStyles.header}>
        <div>
          <h1 style={alStyles.title}>Catalogue</h1>
          <p style={alStyles.subtitle}>{animes.length} anime{animes.length !== 1 ? 's' : ''} enregistré{animes.length !== 1 ? 's' : ''}</p>
        </div>
        <button style={alStyles.addBtn} onClick={onAdd}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajouter un anime
        </button>
      </div>

      {/* Search + Filters */}
      <div style={alStyles.toolbar}>
        <div style={alStyles.searchWrap}>
          <svg style={alStyles.searchIcon} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input
            style={alStyles.searchInput}
            type="text"
            placeholder="Rechercher un anime..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          {search && (
            <button style={alStyles.clearBtn} onClick={() => setSearch('')}>×</button>
          )}
        </div>
        <div style={alStyles.filters}>
          {STATUS_FILTERS.map(f => (
            <button
              key={f}
              style={{ ...alStyles.filterBtn, ...(filter === f ? alStyles.filterBtnActive : {}) }}
              onClick={() => setFilter(f)}
            >
              {f}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      {loading && (
        <div style={alStyles.center}>
          <div style={alStyles.spinner}></div>
          <p style={{ color: 'var(--text-lo)', marginTop: '12px' }}>Chargement…</p>
        </div>
      )}
      {error && (
        <div style={alStyles.errorBox}>
          <strong>Impossible de contacter l'API</strong>
          <p style={{ fontSize: '12px', marginTop: '4px', color: 'var(--text-lo)' }}>{error}</p>
          <button style={alStyles.retryBtn} onClick={load}>Réessayer</button>
        </div>
      )}
      {!loading && !error && filtered.length === 0 && (
        <div style={alStyles.center}>
          <p style={{ color: 'var(--text-lo)' }}>{search ? 'Aucun résultat pour « ' + search + ' »' : 'Aucun anime pour l\'instant.'}</p>
        </div>
      )}
      {!loading && !error && filtered.length > 0 && (
        <div style={alStyles.grid}>
          {filtered.map(anime => (
            <AnimeCard
              key={anime.id}
              anime={anime}
              onSelect={onSelect}
              onDelete={handleDelete}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// AnimeDetail — page détail d'un anime avec édition inline

function AnimeDetail({ animeId, onBack, onEdit }) {
  const [anime, setAnime]     = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  const [users, setUsers]     = useState([]);
  const [showAddList, setShowAddList] = useState(false);
  const [addUserId, setAddUserId]     = useState('');
  const [addStatut, setAddStatut]     = useState('À voir');
  const [addNote, setAddNote]         = useState('');
  const [addMsg, setAddMsg]           = useState(null);
  const [addErr, setAddErr]           = useState(null);
  const [adding, setAdding]           = useState(false);

  const STATUTS = ['Vu', 'En cours de visionnage', 'À voir', 'Abandonné'];

  useEffect(() => {
    if (!animeId) return;
    setLoading(true); setError(null);
    Promise.all([
      apiGetAnime(animeId),
      apiGetUsers(),
    ]).then(([a, u]) => { setAnime(a); setUsers(u); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, [animeId]);

  const handleAddToList = async (e) => {
    e.preventDefault();
    if (!addUserId) { setAddErr("Choisis un utilisateur."); return; }
    setAdding(true); setAddErr(null); setAddMsg(null);
    try {
      await (MOCK_MODE
        ? mockAddUserAnime(parseInt(addUserId), { anime_id: animeId, statut: addStatut, note: addNote ? parseInt(addNote) : null })
        : apiFetch('/users/' + addUserId + '/animes', { method: 'POST', body: JSON.stringify({ anime_id: animeId, statut: addStatut, note: addNote ? parseInt(addNote) : null }) })
      );
      const u = users.find(x => x.id === parseInt(addUserId));
      setAddMsg('Ajouté à la liste de ' + (u ? u.pseudo : 'l\'utilisateur') + ' !');
      setAddUserId(''); setAddStatut('À voir'); setAddNote('');
      setTimeout(() => { setAddMsg(null); setShowAddList(false); }, 2000);
    } catch(err) { setAddErr(err.message); }
    finally { setAdding(false); }
  };

  const statusMeta = {
    'en cours':  { color: 'var(--green)',  label: 'En cours' },
    'terminé':   { color: 'var(--accent)', label: 'Terminé' },
    'à venir':   { color: 'var(--yellow)', label: 'À venir' },
  };
  const meta = anime ? (statusMeta[anime.status] || { color: 'var(--text-lo)', label: anime.status }) : null;

  return (
    <div style={adStyles.container}>
      {/* Back */}
      <button style={adStyles.backBtn} onClick={onBack}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
        Retour au catalogue
      </button>

      {loading && (
        <div style={adStyles.center}>
          <div style={adStyles.spinner}></div>
        </div>
      )}
      {error && (
        <div style={adStyles.errorBox}><strong>Erreur :</strong> {error}</div>
      )}
      {anime && !loading && (
        <div style={adStyles.content}>
          {/* Cover + info */}
          <div style={adStyles.hero}>
            <div style={adStyles.coverLarge}>
              <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <pattern id="stripe-detail" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                    <rect width="7" height="14" fill="oklch(20% 0.02 260)" />
                    <rect x="7" width="7" height="14" fill="oklch(17% 0.015 260)" />
                  </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#stripe-detail)" />
                <text x="50%" y="50%" textAnchor="middle" dominantBaseline="middle" fill="oklch(35% 0.01 260)" fontSize="13" fontFamily="monospace">cover art</text>
              </svg>
            </div>
            <div style={adStyles.heroInfo}>
              <div style={adStyles.idBadge}>#{anime.id}</div>
              <h1 style={adStyles.animeTitle}>{anime.name}</h1>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginTop: '8px' }}>
                <span style={{ ...adStyles.statusBadge, background: meta.color + '22', color: meta.color, border: `1px solid ${meta.color}44` }}>
                  <span style={{ width: '6px', height: '6px', borderRadius: '50%', background: meta.color, display: 'inline-block', marginRight: '6px' }}></span>
                  {meta.label}
                </span>
              </div>
              <div style={adStyles.synopsis}>
                <h3 style={adStyles.sectionLabel}>Genres</h3>
                {anime.genres && anime.genres.length > 0 ? (
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                    {anime.genres.map(g => {
                      const hues = [320, 200, 145, 260, 30, 85, 180, 350];
                      let hash = 0;
                      for (let i = 0; i < g.length; i++) hash = g.charCodeAt(i) + ((hash << 5) - hash);
                      const hue = hues[Math.abs(hash) % hues.length];
                      return (
                        <span key={g} style={{
                          padding: '4px 12px',
                          borderRadius: '100px',
                          fontSize: '13px',
                          fontWeight: '500',
                          background: `oklch(55% 0.14 ${hue} / 0.15)`,
                          border: `1px solid oklch(55% 0.14 ${hue} / 0.35)`,
                          color: `oklch(75% 0.14 ${hue})`,
                        }}>{g}</span>
                      );
                    })}
                  </div>
                ) : (
                  <p style={{ color: 'var(--text-lo)', fontStyle: 'italic', fontSize: '13px' }}>Aucun genre assigné.</p>
                )}
              </div>
              <div style={adStyles.synopsis}>
                <h3 style={adStyles.sectionLabel}>Synopsis</h3>
                <p style={adStyles.synopsisText}>
                  {anime.synopsis || <span style={{ color: 'var(--text-lo)', fontStyle: 'italic' }}>Aucun synopsis disponible.</span>}
                </p>
              </div>
              <div style={adStyles.actions}>
                <button style={adStyles.editBtn} onClick={() => onEdit(anime)}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  Modifier
                </button>
                <button style={adStyles.addListBtn} onClick={() => setShowAddList(s => !s)}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  Ajouter à une liste
                </button>
              </div>

              {showAddList && (
                <form style={adStyles.addListForm} onSubmit={handleAddToList}>
                  <h3 style={adStyles.addListTitle}>Ajouter à la liste d'un utilisateur</h3>
                  <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', alignItems: 'center' }}>
                    <select value={addUserId} onChange={e => setAddUserId(e.target.value)} style={{ flex: 2, minWidth: '140px' }}>
                      <option value="">-- Utilisateur --</option>
                      {users.map(u => <option key={u.id} value={u.id}>{u.pseudo}</option>)}
                    </select>
                    <select value={addStatut} onChange={e => setAddStatut(e.target.value)} style={{ flex: 2, minWidth: '160px' }}>
                      {STATUTS.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                    <input
                      type="number" min="1" max="10"
                      placeholder="Note /10"
                      value={addNote}
                      onChange={e => setAddNote(e.target.value)}
                      style={{ flex: 1, minWidth: '80px' }}
                    />
                    <button type="submit" style={adStyles.editBtn} disabled={adding}>
                      {adding ? '…' : 'Ajouter'}
                    </button>
                  </div>
                  {addErr && <p style={{ color: 'var(--red)', fontSize: '12px', marginTop: '8px' }}>{addErr}</p>}
                  {addMsg && <p style={{ color: 'var(--green)', fontSize: '12px', marginTop: '8px' }}>✓ {addMsg}</p>}
                </form>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// AnimeForm — modal pour ajouter ou modifier un anime (avec genres)
function AnimeForm({ anime, onClose, onSaved }) {
  const isEdit = Boolean(anime);
  const [form, setForm] = useState({
    name:     anime?.name     || '',
    synopsis: anime?.synopsis || '',
    status:   anime?.status   || 'en cours',
    genres:   anime?.genres   || [],
  });
  const [allGenres, setAllGenres] = useState([]);
  const [loading, setLoading]     = useState(false);
  const [error, setError]         = useState(null);

  useEffect(() => {
    apiGetGenres().then(data => setAllGenres(data.map(g => g.name))).catch(() => {});
  }, []);

  const set = (key, val) => setForm(f => ({ ...f, [key]: val }));

  const toggleGenre = (name) => {
    setForm(f => ({
      ...f,
      genres: f.genres.includes(name)
        ? f.genres.filter(g => g !== name)
        : [...f.genres, name],
    }));
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!form.name.trim()) { setError('Le nom est obligatoire.'); return; }
    setLoading(true);
    setError(null);
    try {
      if (isEdit) {
        await apiUpdateAnime(anime.id, form);
      } else {
        await apiAddAnime(form);
      }
      onSaved();
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const onBackdrop = (e) => { if (e.target === e.currentTarget) onClose(); };

  const tagColor = (name) => {
    const hues = [320, 200, 145, 260, 30, 85, 180, 350];
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return hues[Math.abs(hash) % hues.length];
  };

  return (
    <div style={afStyles.backdrop} onClick={onBackdrop}>
      <div style={afStyles.modal}>
        <div style={afStyles.modalHeader}>
          <h2 style={afStyles.modalTitle}>{isEdit ? "Modifier l'anime" : 'Ajouter un anime'}</h2>
          <button style={afStyles.closeBtn} onClick={onClose}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <form style={afStyles.form} onSubmit={handleSubmit}>
          <div style={afStyles.field}>
            <label style={afStyles.label}>Nom <span style={{ color: 'var(--accent)' }}>*</span></label>
            <input
              type="text"
              value={form.name}
              onChange={e => set('name', e.target.value)}
              placeholder="Ex: Fullmetal Alchemist"
              autoFocus
            />
          </div>

          <div style={afStyles.field}>
            <label style={afStyles.label}>Synopsis</label>
            <textarea
              value={form.synopsis}
              onChange={e => set('synopsis', e.target.value)}
              placeholder="Description de l'anime..."
              rows={3}
              style={{ resize: 'vertical' }}
            />
          </div>

          <div style={afStyles.field}>
            <label style={afStyles.label}>Statut</label>
            <div style={afStyles.statusGroup}>
              {['en cours', 'terminé', 'à venir'].map(s => (
                <button
                  key={s}
                  type="button"
                  onClick={() => set('status', s)}
                  style={{
                    ...afStyles.statusOption,
                    ...(form.status === s ? afStyles.statusOptionActive : {}),
                  }}
                >{s}</button>
              ))}
            </div>
          </div>

          <div style={afStyles.field}>
            <label style={afStyles.label}>
              Genres
              {form.genres.length > 0 && (
                <span style={{ color: 'var(--accent)', marginLeft: '6px', fontSize: '11px' }}>
                  {form.genres.length} sélectionné{form.genres.length > 1 ? 's' : ''}
                </span>
              )}
            </label>
            {allGenres.length === 0 ? (
              <p style={{ fontSize: '12px', color: 'var(--text-lo)' }}>
                Aucun genre disponible — crée-en dans la section Genres.
              </p>
            ) : (
              <div style={afStyles.genreGrid}>
                {allGenres.map(name => {
                  const selected = form.genres.includes(name);
                  const hue = tagColor(name);
                  return (
                    <button
                      key={name}
                      type="button"
                      onClick={() => toggleGenre(name)}
                      style={{
                        ...afStyles.genreTag,
                        background: selected ? `oklch(55% 0.14 ${hue} / 0.2)` : 'var(--bg-deep)',
                        border: selected ? `1px solid oklch(55% 0.14 ${hue} / 0.6)` : '1px solid var(--border)',
                        color: selected ? `oklch(75% 0.14 ${hue})` : 'var(--text-lo)',
                      }}
                    >
                      {selected && <span style={{ marginRight: '4px', fontSize: '10px' }}>✓</span>}
                      {name}
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {error && <div style={afStyles.errorMsg}>{error}</div>}

          <div style={afStyles.footer}>
            <button type="button" style={afStyles.cancelBtn} onClick={onClose}>Annuler</button>
            <button type="submit" style={afStyles.submitBtn} disabled={loading}>
              {loading ? 'Enregistrement…' : isEdit ? 'Enregistrer' : 'Ajouter'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// UserList — gestion des utilisateurs

function UserList({ onSelectUser }) {
  const [users, setUsers]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [newPseudo, setNewPseudo] = useState('');
  const [adding, setAdding]     = useState(false);
  const [addError, setAddError] = useState(null);
  const [search, setSearch]     = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const data = await apiGetUsers();
      setUsers(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { load(); }, [load]);

  const handleAdd = async (e) => {
    e.preventDefault();
    if (!newPseudo.trim()) { setAddError('Le pseudo est obligatoire.'); return; }
    setAdding(true);
    setAddError(null);
    try {
      await apiAddUser({ pseudo: newPseudo.trim() });
      setNewPseudo('');
      await load();
    } catch (err) {
      setAddError(err.message);
    } finally {
      setAdding(false);
    }
  };

  const handleDelete = async (id, pseudo) => {
    if (!window.confirm(`Supprimer l'utilisateur "${pseudo}" ?`)) return;
    try {
      await apiDeleteUser(id);
      setUsers(prev => prev.filter(u => u.id !== id));
    } catch (e) {
      alert('Erreur : ' + e.message);
    }
  };

  const filtered = users.filter(u =>
    u.pseudo.toLowerCase().includes(search.toLowerCase())
  );

  const avatarColor = (pseudo) => {
    const hues = [320, 200, 145, 260, 30, 85];
    let hash = 0;
    for (let i = 0; i < pseudo.length; i++) hash = pseudo.charCodeAt(i) + ((hash << 5) - hash);
    return `oklch(60% 0.18 ${hues[Math.abs(hash) % hues.length]})`;
  };

  return (
    <div style={ulStyles.container}>
      <div style={ulStyles.header}>
        <div>
          <h1 style={ulStyles.title}>Utilisateurs</h1>
          <p style={ulStyles.subtitle}>{users.length} utilisateur{users.length !== 1 ? 's' : ''}</p>
        </div>
      </div>

      {/* Add form */}
      <div style={ulStyles.addBox}>
        <h3 style={ulStyles.addTitle}>Ajouter un utilisateur</h3>
        <form style={ulStyles.addForm} onSubmit={handleAdd}>
          <input
            type="text"
            placeholder="Pseudo..."
            value={newPseudo}
            onChange={e => { setNewPseudo(e.target.value); setAddError(null); }}
            style={{ flex: 1 }}
          />
          <button type="submit" style={ulStyles.addBtn} disabled={adding}>
            {adding ? '…' : 'Ajouter'}
          </button>
        </form>
        {addError && <p style={ulStyles.addError}>{addError}</p>}
      </div>

      {/* Search */}
      <div style={ulStyles.searchWrap}>
        <svg style={ulStyles.searchIcon} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          type="text"
          placeholder="Rechercher un utilisateur..."
          value={search}
          onChange={e => setSearch(e.target.value)}
          style={{ paddingLeft: '34px' }}
        />
      </div>

      {/* Content */}
      {loading && <div style={ulStyles.center}><div style={ulStyles.spinner}></div></div>}
      {error && <div style={ulStyles.errorBox}><strong>Erreur :</strong> {error}<button style={ulStyles.retryBtn} onClick={load}>Réessayer</button></div>}

      {!loading && !error && (
        <div style={ulStyles.list}>
          {filtered.length === 0 && (
            <div style={ulStyles.empty}>Aucun utilisateur trouvé.</div>
          )}
          {filtered.map(user => (
            <div key={user.id} style={ulStyles.row}>
              <div style={{ ...ulStyles.avatar, background: avatarColor(user.pseudo) }}>
                {user.pseudo[0].toUpperCase()}
              </div>
              <div style={ulStyles.userInfo}>
                <span style={ulStyles.pseudo}>{user.pseudo}</span>
                <span style={ulStyles.userId}>#{user.id}</span>
              </div>
              <button
                style={ulStyles.profileBtn}
                onClick={() => onSelectUser(user)}
                title="Voir la liste"
              >
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <button
                style={ulStyles.deleteBtn}
                onClick={() => handleDelete(user.id, user.pseudo)}
                title="Supprimer"
              >
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// UserProfile — liste des animes d'un utilisateur
function UserProfile({ user, onBack }) {
  const [list, setList]         = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [animes, setAnimes]     = useState([]);
  const [search, setSearch]     = useState('');
  const [showAdd, setShowAdd]   = useState(false);
  const [addAnimeId, setAddAnimeId] = useState('');
  const [addStatut, setAddStatut]   = useState('À voir');
  const [addNote, setAddNote]       = useState('');
  const [adding, setAdding]         = useState(false);
  const [addError, setAddError]     = useState(null);
  const [editEntry, setEditEntry]   = useState(null); // { anime_id, statut, note }

  const STATUTS = ['Vu', 'En cours de visionnage', 'À voir', 'Abandonné'];
  const STATUT_COLORS = {
    'Vu':                   { bg: 'oklch(65% 0.18 145 / 0.15)', border: 'oklch(65% 0.18 145 / 0.4)', text: 'oklch(65% 0.18 145)' },
    'En cours de visionnage':{ bg: 'oklch(65% 0.22 320 / 0.15)', border: 'oklch(65% 0.22 320 / 0.4)', text: 'oklch(65% 0.22 320)' },
    'À voir':               { bg: 'oklch(75% 0.16 85 / 0.15)',  border: 'oklch(75% 0.16 85 / 0.4)',  text: 'oklch(75% 0.16 85)' },
    'Abandonné':            { bg: 'oklch(60% 0.2 20 / 0.15)',   border: 'oklch(60% 0.2 20 / 0.4)',   text: 'oklch(60% 0.2 20)' },
  };

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [listData, animesData] = await Promise.all([
        MOCK_MODE ? mockGetUserAnimes(user.id) : apiFetch('/users/' + user.id + '/animes'),
        apiGetAnimes(),
      ]);
      setList(listData);
      setAnimes(animesData);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }, [user.id]);

  useEffect(() => { load(); }, [load]);

  const handleAdd = async (e) => {
    e.preventDefault();
    if (!addAnimeId) { setAddError('Choisis un anime.'); return; }
    setAdding(true); setAddError(null);
    try {
      await (MOCK_MODE
        ? mockAddUserAnime(user.id, { anime_id: parseInt(addAnimeId), statut: addStatut, note: addNote ? parseInt(addNote) : null })
        : apiFetch('/users/' + user.id + '/animes', { method: 'POST', body: JSON.stringify({ anime_id: parseInt(addAnimeId), statut: addStatut, note: addNote ? parseInt(addNote) : null }) })
      );
      setAddAnimeId(''); setAddStatut('À voir'); setAddNote('');
      setShowAdd(false);
      await load();
    } catch(err) { setAddError(err.message); }
    finally { setAdding(false); }
  };

  const handleUpdate = async (anime_id, statut, note) => {
    try {
      await (MOCK_MODE
        ? mockUpdateUserAnime(user.id, anime_id, { statut, note: note ? parseInt(note) : null })
        : apiFetch('/users/' + user.id + '/animes/' + anime_id, { method: 'PUT', body: JSON.stringify({ statut, note: note ? parseInt(note) : null }) })
      );
      setEditEntry(null);
      await load();
    } catch(e) { alert('Erreur : ' + e.message); }
  };

  const handleDelete = async (anime_id, anime_name) => {
    if (!window.confirm('Retirer "' + anime_name + '" de la liste ?')) return;
    try {
      await (MOCK_MODE
        ? mockDeleteUserAnime(user.id, anime_id)
        : apiFetch('/users/' + user.id + '/animes/' + anime_id, { method: 'DELETE' })
      );
      await load();
    } catch(e) { alert('Erreur : ' + e.message); }
  };

  const availableAnimes = animes.filter(a => !list.find(ua => ua.anime_id === a.id));
  const filtered = list.filter(ua => ua.anime_name.toLowerCase().includes(search.toLowerCase()));

  const renderStars = (note) => {
    if (!note) return null;
    return (
      <span style={upStyles.note}>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="oklch(75% 0.16 85)" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        {note}/10
      </span>
    );
  };

  return (
    <div style={upStyles.container}>
      <button style={upStyles.backBtn} onClick={onBack}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
        Retour aux utilisateurs
      </button>

      <div style={upStyles.header}>
        <div style={upStyles.avatarLarge}>{user.pseudo[0].toUpperCase()}</div>
        <div>
          <h1 style={upStyles.title}>{user.pseudo}</h1>
          <p style={upStyles.subtitle}>{list.length} anime{list.length !== 1 ? 's' : ''} dans la liste</p>
        </div>
        <button style={upStyles.addBtn} onClick={() => setShowAdd(s => !s)}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajouter un anime
        </button>
      </div>

      {/* Formulaire ajout */}
      {showAdd && (
        <form style={upStyles.addBox} onSubmit={handleAdd}>
          <h3 style={upStyles.addTitle}>Ajouter à la liste</h3>
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
            <select value={addAnimeId} onChange={e => setAddAnimeId(e.target.value)} style={{ flex: 2, minWidth: '160px' }}>
              <option value="">-- Choisir un anime --</option>
              {availableAnimes.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
            <select value={addStatut} onChange={e => setAddStatut(e.target.value)} style={{ flex: 2, minWidth: '140px' }}>
              {STATUTS.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <input
              type="number" min="1" max="10"
              placeholder="Note /10"
              value={addNote}
              onChange={e => setAddNote(e.target.value)}
              style={{ flex: 1, minWidth: '80px' }}
            />
            <button type="submit" style={upStyles.submitBtn} disabled={adding}>
              {adding ? '…' : 'Ajouter'}
            </button>
          </div>
          {addError && <p style={{ color: 'var(--red)', fontSize: '12px', marginTop: '6px' }}>{addError}</p>}
        </form>
      )}

      {/* Recherche */}
      {list.length > 0 && (
        <div style={upStyles.searchWrap}>
          <svg style={upStyles.searchIcon} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Rechercher dans la liste..." value={search} onChange={e => setSearch(e.target.value)} style={{ paddingLeft: '34px' }} />
        </div>
      )}

      {loading && <div style={upStyles.center}><div style={upStyles.spinner}></div></div>}
      {error && <div style={upStyles.errorBox}>{error}</div>}

      {!loading && !error && (
        <div style={upStyles.list}>
          {filtered.length === 0 && (
            <div style={upStyles.empty}>
              {list.length === 0 ? 'Aucun anime dans la liste — ajoutes-en !' : 'Aucun résultat.'}
            </div>
          )}
          {filtered.map(ua => {
            const sc = STATUT_COLORS[ua.statut] || STATUT_COLORS['À voir'];
            const isEditing = editEntry && editEntry.anime_id === ua.anime_id;
            return (
              <div key={ua.anime_id} style={upStyles.row}>
                <div style={upStyles.rowInfo}>
                  <span style={upStyles.animeName}>{ua.anime_name}</span>
                  {ua.anime_genres && ua.anime_genres.length > 0 && (
                    <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                      {ua.anime_genres.slice(0, 3).map(g => (
                        <span key={g} style={upStyles.genreTag}>{g}</span>
                      ))}
                    </div>
                  )}
                </div>
                <div style={upStyles.rowMeta}>
                  {isEditing ? (
                    <div style={{ display: 'flex', gap: '6px', alignItems: 'center', flexWrap: 'wrap' }}>
                      <select
                        value={editEntry.statut}
                        onChange={e => setEditEntry(p => ({ ...p, statut: e.target.value }))}
                        style={{ fontSize: '12px', padding: '4px 8px' }}
                      >
                        {STATUTS.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                      <input
                        type="number" min="1" max="10"
                        value={editEntry.note || ''}
                        onChange={e => setEditEntry(p => ({ ...p, note: e.target.value }))}
                        placeholder="/10"
                        style={{ width: '60px', fontSize: '12px', padding: '4px 8px' }}
                      />
                      <button style={upStyles.saveBtn} onClick={() => handleUpdate(ua.anime_id, editEntry.statut, editEntry.note)}>✓</button>
                      <button style={upStyles.cancelEditBtn} onClick={() => setEditEntry(null)}>✕</button>
                    </div>
                  ) : (
                    <>
                      <span style={{ ...upStyles.statut, background: sc.bg, border: `1px solid ${sc.border}`, color: sc.text }}>
                        {ua.statut}
                      </span>
                      {renderStars(ua.note)}
                      <button style={upStyles.editBtn} onClick={() => setEditEntry({ anime_id: ua.anime_id, statut: ua.statut, note: ua.note || '' })} title="Modifier">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button style={upStyles.deleteBtn} onClick={() => handleDelete(ua.anime_id, ua.anime_name)} title="Retirer">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                      </button>
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// GenreManager — gestion des genres

function GenreManager() {
  const [genres, setGenres]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [newGenre, setNewGenre] = useState('');
  const [adding, setAdding]     = useState(false);
  const [addError, setAddError] = useState(null);
  const [added, setAdded]       = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const data = await apiGetGenres();
      setGenres(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { load(); }, [load]);

  const handleAdd = async (e) => {
    e.preventDefault();
    if (!newGenre.trim()) { setAddError('Le nom du genre est obligatoire.'); return; }
    setAdding(true);
    setAddError(null);
    try {
      await apiAddGenre({ name: newGenre.trim() });
      setAdded(newGenre.trim());
      setNewGenre('');
      await load();
      setTimeout(() => setAdded(null), 2500);
    } catch (err) {
      setAddError(err.message);
    } finally {
      setAdding(false);
    }
  };

  const tagColor = (name) => {
    const hues = [320, 200, 145, 260, 30, 85, 180, 350];
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    const hue = hues[Math.abs(hash) % hues.length];
    return {
      bg:     `oklch(55% 0.14 ${hue} / 0.15)`,
      border: `oklch(55% 0.14 ${hue} / 0.35)`,
      text:   `oklch(75% 0.14 ${hue})`,
    };
  };

  return (
    <div style={gmStyles.container}>
      <div style={gmStyles.header}>
        <div>
          <h1 style={gmStyles.title}>Genres</h1>
          <p style={gmStyles.subtitle}>{genres.length} genre{genres.length !== 1 ? 's' : ''} enregistré{genres.length !== 1 ? 's' : ''}</p>
        </div>
      </div>

      {/* Add form */}
      <div style={gmStyles.addBox}>
        <h3 style={gmStyles.addTitle}>Ajouter un genre</h3>
        <form style={gmStyles.addForm} onSubmit={handleAdd}>
          <input
            type="text"
            placeholder="Ex: Shōnen, Isekai, Slice of life..."
            value={newGenre}
            onChange={e => { setNewGenre(e.target.value); setAddError(null); }}
            style={{ flex: 1 }}
          />
          <button type="submit" style={gmStyles.addBtn} disabled={adding}>
            {adding ? '…' : 'Ajouter'}
          </button>
        </form>
        {addError && <p style={gmStyles.addError}>{addError}</p>}
        {added && <p style={gmStyles.addSuccess}>✓ Genre « {added} » ajouté !</p>}
      </div>

      {/* Content */}
      {loading && <div style={gmStyles.center}><div style={gmStyles.spinner}></div></div>}
      {error && (
        <div style={gmStyles.errorBox}>
          <strong>Erreur :</strong> {error}
          <button style={gmStyles.retryBtn} onClick={load}>Réessayer</button>
        </div>
      )}
      {!loading && !error && (
        <div style={gmStyles.content}>
          {genres.length === 0 ? (
            <div style={gmStyles.empty}>Aucun genre enregistré pour l'instant.</div>
          ) : (
            <div style={gmStyles.tagsGrid}>
              {genres.map(g => {
                const c = tagColor(g.name);
                return (
                  <div
                    key={g.name}
                    style={{
                      ...gmStyles.tag,
                      background: c.bg,
                      border: `1px solid ${c.border}`,
                      color: c.text,
                    }}
                  >
                    {g.name}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// App — composant racine, gestion de la navigation et des modals

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "oklch(65% 0.22 320)",
  "darkBg": true,
  "fontHead": "Space Grotesk",
  "cardMinWidth": 200
}/*EDITMODE-END*/;

function App() {
  const [page, setPage]                   = useState('animes');
  const [selectedAnime, setSelectedAnime] = useState(null);
  const [editAnime, setEditAnime]         = useState(null);
  const [refreshKey, setRefreshKey]       = useState(0);
  const [mockMode, setMockModeState]      = useState(false);
  const [selectedUser, setSelectedUser]   = useState(null);

  const [tweaks, setTweaksState] = useTweaks(TWEAK_DEFAULTS);

  const refresh = () => setRefreshKey(k => k + 1);

  const handleToggleMock = useCallback(() => {
    setMockModeState(prev => {
      const next = !prev;
      setMockMode(next);
      setPage('animes');
      setSelectedAnime(null);
      setRefreshKey(k => k + 1);
      return next;
    });
  }, []);

  const handleSelectAnime = useCallback((anime) => {
    setSelectedAnime(anime);
    setPage('anime-detail');
  }, []);

  const handleAddAnime  = useCallback(() => setEditAnime({}), []);
  const handleEditAnime = useCallback((anime) => setEditAnime(anime), []);

  const handleFormSaved = useCallback(() => {
    setEditAnime(null);
    if (page === 'anime-detail') {
      setSelectedAnime(prev => ({ ...prev }));
    }
    refresh();
    setPage('animes');
  }, [page]);

  const accentStyle = {
    '--accent':      tweaks.accentColor,
    '--accent-dim':  tweaks.accentColor,
    '--accent-glow': tweaks.accentColor + '40',
    '--bg-deep':     tweaks.darkBg ? 'oklch(10% 0.01 260)' : 'oklch(96% 0.005 260)',
    '--bg-surface':  tweaks.darkBg ? 'oklch(14% 0.012 260)' : 'oklch(92% 0.006 260)',
    '--bg-card':     tweaks.darkBg ? 'oklch(17% 0.015 260)' : 'oklch(98% 0.004 260)',
    '--border':      tweaks.darkBg ? 'oklch(25% 0.02 260)'  : 'oklch(85% 0.01 260)',
    '--text-hi':     tweaks.darkBg ? 'oklch(96% 0.005 260)' : 'oklch(14% 0.01 260)',
    '--text-mid':    tweaks.darkBg ? 'oklch(70% 0.01 260)'  : 'oklch(35% 0.01 260)',
    '--text-lo':     tweaks.darkBg ? 'oklch(45% 0.01 260)'  : 'oklch(55% 0.01 260)',
  };

  return (
    <div style={{ ...appStyles.shell, ...accentStyle }}>
      <Sidebar
        currentPage={page === 'anime-detail' ? 'animes' : page}
        onNavigate={(p) => { setPage(p); setSelectedAnime(null); setSelectedUser(null); }}
        mockMode={mockMode}
        onToggleMock={handleToggleMock}
      />

      <main style={appStyles.main}>
        {page === 'animes' && (
          <AnimeList
            onSelect={handleSelectAnime}
            onAdd={handleAddAnime}
            refreshKey={refreshKey}
          />
        )}
        {page === 'anime-detail' && selectedAnime && (
          <AnimeDetail
            animeId={selectedAnime.id}
            onBack={() => setPage('animes')}
            onEdit={handleEditAnime}
          />
        )}
        {page === 'users'  && !selectedUser && <UserList key={refreshKey} onSelectUser={(u) => setSelectedUser(u)} />}
        {page === 'users'  && selectedUser  && <UserProfile user={selectedUser} onBack={() => setSelectedUser(null)} />}
        {page === 'genres' && <GenreManager key={refreshKey} />}
      </main>

      {editAnime !== null && (
        <AnimeForm
          anime={editAnime && editAnime.id ? editAnime : null}
          onClose={() => setEditAnime(null)}
          onSaved={handleFormSaved}
        />
      )}

      <TweaksPanel tweaks={tweaks} setTweak={setTweaksState}>
        <TweakSection title="Apparence">
          <TweakColor
            label="Couleur accentuation"
            value={tweaks.accentColor}
            onChange={v => setTweaksState('accentColor', v)}
          />
          <TweakToggle
            label="Mode sombre"
            value={tweaks.darkBg}
            onChange={v => setTweaksState('darkBg', v)}
          />
          <TweakSelect
            label="Police titres"
            value={tweaks.fontHead}
            options={['Space Grotesk', 'DM Sans', 'Outfit', 'Sora']}
            onChange={v => {
              setTweaksState('fontHead', v);
              document.documentElement.style.setProperty('--font-head', `'${v}', sans-serif`);
            }}
          />
        </TweakSection>
        <TweakSection title="Grille anime">
          <TweakSlider
            label="Largeur min. carte"
            value={tweaks.cardMinWidth}
            min={140} max={300} step={10}
            onChange={v => setTweaksState('cardMinWidth', v)}
          />
        </TweakSection>
      </TweaksPanel>

      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        body { font-family: var(--font-body); }
        h1, h2, h3 { font-family: var(--font-head, 'Space Grotesk', sans-serif); }
      `}</style>
    </div>
  );
}

  </script>
