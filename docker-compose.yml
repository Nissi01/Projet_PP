version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myanimelist
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - ./app.db:/docker-entrypoint-initdb.d/init.sql
    
  api:
    build: .
    ports:
      - "5001:5001"
    depends_on:
      - db
